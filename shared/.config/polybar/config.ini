[colors]
background = #141413
background-alt = #242321
foreground = #ffffff
foreground-alt = #998f84
focused = #0a9dff
urgent = #ff2c4b

[bar/mainbar]
monitor = ${env:MONITOR}
width = 100%
height = 34
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 0
padding-left = 1
padding-right = 1
module-margin = 1

font-0 = Hack Nerd Font:size=16;2
font-1 = Symbols Nerd Font:size=16;2

modules-left = i3

enable-ipc = true

[module/i3]
type = internal/i3
pin-workspaces = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
fuzzy-match = true

; Per-project icons: fuzzy-match means each line's left side just needs to be
; a substring of the workspace name, so one line covers both the yoko half
; ("6:HpbxGUI") and tate half ("6b:HpbxGUI"). Falls back to ws-icon-default
; for anything not listed yet (still-generic ProjectD, ProjectK..ProjectT).
ws-icon-0 = Home;
ws-icon-1 = Browser;
ws-icon-2 = Chat;
ws-icon-3 = MttAi;
ws-icon-4 = HpbxGUI;
ws-icon-5 = EqptGUI;
ws-icon-6 = TicketsGUI;
ws-icon-7 = TicketsAPI;
ws-icon-8 = Troubleshoot;
ws-icon-default = 

label-focused = %icon% %name%
label-focused-background = ${colors.background-alt}
label-focused-foreground = ${colors.focused}
label-focused-underline = ${colors.focused}
label-focused-padding = 2

label-unfocused = %icon% %name%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 2

label-visible = %icon% %name%
label-visible-foreground = ${colors.foreground}
label-visible-padding = 2

label-urgent = %icon% %name%
label-urgent-background = ${colors.urgent}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2

[bar/mainbar-tate]
inherit = bar/mainbar
bottom = true

[settings]
screenchange-reload = true
